spring.application.name=apfelkomplott
server.port=8081
spring.datasource.url=jdbc:h2:mem:apfelkomplott;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# Default startup uses an in-memory H2 database so PostgreSQL stays optional.
# Enable PostgreSQL locally with:
#   --spring.profiles.active=postgres
# and optionally override DB_URL, DB_USERNAME, and DB_PASSWORD.

